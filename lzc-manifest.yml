application:
  subdomain: fogejo
  background_task: true
  upstreams:
    - location: /
      backend: http://forgejo-server:3000/
  public_path:
    - /
  ingress:
    - protocol: tcp
      port: 22
      service: forgejo-server
services:
  forgejo-server:
    # forgejoclone/forgejo:15.0.3
    # upstream: forgejoclone/forgejo:16.0.1
    image: registry.lazycat.cloud/czyt/forgejoclone/forgejo:6cfebb61776cffcf
    environment:
      - USER_UID=1000
      - USER_GID=1000
    binds:
      - /lzcapp/var/data:/data
